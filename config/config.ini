[globals]

; Please see the file /config/local/config.local.ini, which contains additional
; local configuration options
;
; SECURITY NOTICE
; In non-dedicated environments, you should lock down the permissions of this
; file so that it cannot be seen by other users on the system.

;Common constants
DEBUG = 0
UI = ui/
;AUTOLOAD = app/
PACKAGE = system
START_DATE = "1969-01-01"
APP_USER_AGENT = endoguard-console

;DB
SALT = "^*(!)$)"
KEEP_SESSION_IN_DB=1
MIN_PASSWORD_LENGTH=8
DEFAULT_API_KEY_NAME=system
DEFAULT_API_KEY_QUOTE=100
NUMBER_OF_TOP_USERS=10
RENEW_PASSWORD_LINK_TIME=86400
REVIEWED_QUEUE_CNT_CACHE_TIME=600
LAST_EVENT_CACHE_TIME=600
NO_EVENTS_TIME = 86400

;Passwords
PEPPER = BBlcw0shYHXXCBIIXxaiBySgn3GW0Uzj

;Logs
LOGS = assets/logs/
LOG_FILE = error.log
LOG_SQL_FILE = sql.log
PRINT_ERROR_TRACE_TO_LOG = 1
PRINT_SQL_LOG_AFTER_EACH_SCRIPT_CALL = 0
LOG_DELIMITER = "========================"

;Emails
SEND_EMAIL=1
SMTP_DEBUG=0

;Enrichment
ENRICHMENT_API = https://api.endoguard.io

;Custom tuning
FORCE_HTTPS = false
ALLOW_FORGOT_PASSWORD = false
ALLOW_EMAIL_PHONE = false
LOGBOOK_LIMIT = 3000
LEAKY_BUCKET_RPS=10
LEAKY_BUCKET_WINDOW=20
